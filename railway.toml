[build]
builder = "NIXPACKS"
buildCommand = "npm install -g pnpm@9 && pnpm install --no-frozen-lockfile && pnpm --filter web build"

[deploy]
startCommand = "node apps/web/.next/standalone/server.js"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
